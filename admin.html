<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 15px;
}

.box {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

button {
  padding: 8px 12px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.approve { background: green; color: white; }
.reject { background: red; color: white; }
</style>

</head>
<body>

<h2>Admin Panel</h2>

<div id="requests"></div>

<script>

function loadRequests(){
  let data = JSON.parse(localStorage.getItem("depositRequests")) || [];
  let html = "";

  data.forEach((r, i) => {
    html += `
    <div class="box">
      <p>Amount: ₹ ${r.amount}</p>
      <p>Status: ${r.status}</p>
      <p>Time: ${r.time}</p>

      ${r.status === "pending" ? `
      <button class="approve" onclick="approve(${i})">Approve</button>
      <button class="reject" onclick="reject(${i})">Reject</button>
      ` : ""}
    </div>
    `;
  });

  document.getElementById("requests").innerHTML = html;
}

function approve(i){
  let data = JSON.parse(localStorage.getItem("depositRequests"));
  data[i].status = "approved";

  // wallet update
  let wallet = localStorage.getItem("wallet") || 0;
  wallet = parseInt(wallet) + parseInt(data[i].amount);
  localStorage.setItem("wallet", wallet);

  localStorage.setItem("depositRequests", JSON.stringify(data));
  loadRequests();
}

function reject(i){
  let data = JSON.parse(localStorage.getItem("depositRequests"));
  data[i].status = "rejected";

  localStorage.setItem("depositRequests", JSON.stringify(data));
  loadRequests();
}

loadRequests();

</script>

</body>
</html>
