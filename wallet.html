<!DOCTYPE html>
<html>
<head>
<title>Wallet</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding-top:40px;
  padding-bottom:70px;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00f2fe,#4facfe);
  color:white;
  margin-top:10px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="card">
<h2>💰 Wallet</h2>
<p>Balance: ₹100</p>
<button>Add Money</button>
<button>Withdraw</button>
</div>

<div class="nav">
<div onclick="goHome()">🏠</div>
<div onclick="goProfile()">👤</div>
<div onclick="goMatches()">🎮</div>
</div>

<script>
function goHome(){ window.location.href="index.html"; }
function goProfile(){ window.location.href="profile.html"; }
function goMatches(){ window.location.href="mymatch.html"; }
</script>

</body>
</html>
