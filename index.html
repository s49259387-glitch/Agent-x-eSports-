<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1d1f3a,#2b2e5a);
  color: white;
  padding-bottom: 140px;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  align-items: center;
}

.walletBox {
  border: 2px solid cyan;
  border-radius: 20px;
  padding: 5px 12px;
}

.joinBtn {
  width: 100%;
  padding: 14px;
  background: cyan;
  border: none;
  border-radius: 10px;
  margin-top: 15px;
  font-weight: bold;
  font-size: 16px;
}

.navbar {
  position: fixed;
  bottom: 60px;
  width: 100%;
  background: #1d1f3a;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("login") !== "yes"){
  window.location.href = "login.html";
}
</script>

<div class="header">
  <div>🔥 Agent X eSports</div>
  <div>
    <span class="walletBox" id="walletBalance">₹ 0</span>
    <span onclick="logout()" style="cursor:pointer;margin-left:10px;">🚪</span>
  </div>
</div>

<div style="padding:15px;">
  <button class="joinBtn" onclick="deposit()">Deposit</button>
  <button class="joinBtn" onclick="withdraw()">Withdraw</button>
</div>

<div id="adminPanel" style="padding:15px; display:none;">
  <h3>Admin Panel</h3>
  <div id="requests"></div>
</div>

<div class="navbar">
  <div onclick="location.reload()">🏠 Home</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "agent-x-d7f22.firebaseapp.com",
  projectId: "agent-x-d7f22",
  storageBucket: "agent-x-d7f22.appspot.com",
  messagingSenderId: "1055506789692",
  appId: "1:1055506789692:web:72a9df8c2cf9a57c92da39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 FIX: use Firebase UID (important)
let userId = localStorage.getItem("uid");

// WALLET LOAD
async function loadWallet(){
  const ref = doc(db, "wallets", userId);
  const snap = await getDoc(ref);

  if(snap.exists()){
    document.getElementById("walletBalance").innerText = "₹ " + snap.data().balance;
  } else {
    await setDoc(ref, { balance: 0 });
    document.getElementById("walletBalance").innerText = "₹ 0";
  }
}
loadWallet();

// DEPOSIT
window.deposit = async function(){
  let amt = prompt("Enter Amount");
  if(!amt || amt<=0) return alert("Invalid ❌");

  await addDoc(collection(db, "requests"), {
    userId,
    type: "deposit",
    amount: Number(amt),
    status: "pending"
  });

  alert("Request Sent ✅");
}

// WITHDRAW
window.withdraw = async function(){
  let amt = prompt("Enter Amount");
  if(!amt || amt<=0) return alert("Invalid ❌");

  const ref = doc(db, "wallets", userId);
  const snap = await getDoc(ref);
  let bal = snap.exists() ? snap.data().balance : 0;

  if(amt > bal) return alert("Insufficient ❌");

  await addDoc(collection(db, "requests"), {
    userId,
    type: "withdraw",
    amount: Number(amt),
    status: "pending"
  });

  alert("Request Sent ✅");
}

// LOGOUT
window.logout = function(){
  localStorage.clear();
  window.location.href="login.html";
}

</script>

</body>
</html>
