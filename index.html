<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1b1b3a,#2a2a5a);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

/* BANNER */
.banner {
  margin: 12px;
  height: 180px;
  border-radius: 20px;
  overflow: hidden;
}
.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CARD GRID */
.matchGrid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  padding: 12px;
}

.matchCard {
  background: #3a3a6a;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.matchCard img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.matchCard p {
  text-align: center;
  padding: 10px;
}

/* DETAILS PAGE */
.details {
  display: none;
  padding: 15px;
}

.matchBox {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 20px;
  margin-bottom: 15px;

  /* GLOW EFFECT */
  box-shadow: 0 0 15px cyan;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.joinBtn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: cyan;
  font-weight: bold;
  margin-top: 10px;
}

.backBtn {
  margin-bottom: 10px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div>₹0</div>
</div>

<!-- HOME -->
<div id="home">

  <div class="banner">
    <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
  </div>

  <h2 style="text-align:center;">Select Match Type</h2>

  <div class="matchGrid">
    <div class="matchCard" onclick="openDetails()">
      <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openDetails()">
      <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
      <p>Full Map</p>
    </div>
  </div>

</div>

<!-- DETAILS PAGE -->
<div id="details" class="details">

  <div class="backBtn" onclick="goBack()">⬅ Back</div>

  <h2>Lone Wolf 1v1</h2>

  <!-- MATCH 1 -->
  <div class="matchBox">
    <h3>Match 1</h3>

    <div class="row"><span>Prize Pool</span><span>₹ 55</span></div>
    <div class="row"><span>Per Kill</span><span>₹ 0</span></div>
    <div class="row"><span>Entry Fee</span><span>₹ 10</span></div>
    <div class="row"><span>Type</span><span>Solo</span></div>
    <div class="row"><span>Version</span><span>TPP</span></div>
    <div class="row"><span>Map</span><span>Lone Wolf</span></div>

    <button class="joinBtn">Join Match</button>
  </div>

  <!-- MATCH 2 -->
  <div class="matchBox">
    <h3>Match 2</h3>

    <div class="row"><span>Prize Pool</span><span>₹ 100</span></div>
    <div class="row"><span>Per Kill</span><span>₹ 10</span></div>
    <div class="row"><span>Entry Fee</span><span>₹ 20</span></div>
    <div class="row"><span>Type</span><span>Solo</span></div>
    <div class="row"><span>Version</span><span>TPP</span></div>
    <div class="row"><span>Map</span><span>Lone Wolf</span></div>

    <button class="joinBtn">Join Match</button>
  </div>

</div>

<script>
function openDetails(){
  document.getElementById("home").style.display="none";
  document.getElementById("details").style.display="block";
}

function goBack(){
  document.getElementById("home").style.display="block";
  document.getElementById("details").style.display="none";
}
</script>

</body>
</html>
