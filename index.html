<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#1e1f3a,#2c2f5a);
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  align-items:center;
}

.walletBox{
  border:2px solid cyan;
  padding:6px 14px;
  border-radius:20px;
}

/* MATCH SCREEN */
.matchScreen{
  padding:15px;
}

.matchCardNew{
  background:#fff;
  color:#000;
  border-radius:15px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 0 15px cyan;
}

/* TOP INFO */
.matchTop{
  display:flex;
  gap:10px;
  align-items:center;
}

.matchTop img{
  width:60px;
  height:60px;
  border-radius:10px;
}

/* GRID */
.matchGridNew{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  text-align:center;
  margin-top:15px;
  gap:10px;
}

.matchGridNew div{
  font-size:14px;
}

/* JOIN BUTTON */
.joinBtn{
  background:#000;
  color:#fff;
  padding:12px;
  text-align:center;
  border-radius:10px;
  margin-top:15px;
  font-weight:bold;
}

/* BACK */
.backBtn{
  margin-bottom:10px;
  display:block;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div class="walletBox">₹ <span id="topBalance">0</span></div>
</div>

<!-- MATCH SCREEN -->
<div id="matchScreen" class="matchScreen" style="display:none">

  <span class="backBtn" onclick="goBack()">← Back</span>

  <h2 id="matchTitle"></h2>

  <div id="matchList"></div>

</div>

<!-- HOME -->
<div id="home">

<h2 style="text-align:center;">Select Match Type</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:15px;">

<div onclick="openMatch('Lone Wolf 1v1')">
  <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png" style="width:100%;border-radius:10px;">
  <p style="text-align:center;">Lone wolf (1v1)</p>
</div>

</div>

</div>

<script>

let matchesData = {
"Lone Wolf 1v1":[
{
id:"#3165",
time:"09/04/2026 02:45 pm",
prize:55,
perKill:0,
entry:10,
type:"Solo",
version:"TPP",
map:"Lone wolf",
players:"2/2"
},
{
id:"#3166",
time:"09/04/2026 03:00 pm",
prize:30,
perKill:0,
entry:10,
type:"Solo",
version:"TPP",
map:"Lone wolf",
players:"1/2"
}
]
};

function openMatch(type){
document.getElementById("home").style.display="none";
document.getElementById("matchScreen").style.display="block";

document.getElementById("matchTitle").innerText = type;

let container = document.getElementById("matchList");
container.innerHTML = "";

matchesData[type].forEach(match => {

container.innerHTML += `
<div class="matchCardNew">

<div class="matchTop">
<img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
<div>
<b>${type} ( SKILL YES ) - Match ${match.id}</b><br>
<small>${match.time}</small>
</div>
</div>

<div class="matchGridNew">
<div>PRIZE POOL<br><b>₹ ${match.prize}</b></div>
<div>PER KILL<br><b>₹ ${match.perKill}</b></div>
<div>ENTRY FEE<br><b>₹ ${match.entry}</b></div>

<div>TYPE<br><b>${match.type}</b></div>
<div>VERSION<br><b>${match.version}</b></div>
<div>MAP<br><b>${match.map}</b></div>
</div>

<div style="margin-top:10px;">
${match.players}
</div>

<div class="joinBtn" onclick="joinMatch(${match.entry})">
JOIN MATCH
</div>

</div>
`;

});

}

function goBack(){
document.getElementById("home").style.display="block";
document.getElementById("matchScreen").style.display="none";
}

function joinMatch(entry){
let balance = parseInt(localStorage.getItem("wallet") || 0);

if(balance < entry){
alert("Insufficient Balance");
return;
}

balance -= entry;
localStorage.setItem("wallet", balance);
document.getElementById("topBalance").innerText = balance;

alert("Joined Successfully!");
}

</script>

</body>
</html>
