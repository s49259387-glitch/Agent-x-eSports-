<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1d1f3a,#2b2e5a);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

.walletBox {
  border: 2px solid cyan;
  border-radius: 20px;
  padding: 5px 12px;
}

/* BANNER */
.banner img {
  width: 100%;
  border-radius: 15px;
}

/* TITLE */
.sectionTitle {
  text-align: center;
  margin: 20px 0;
}

/* MATCH GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
}

.matchCard {
  background: #3a3d6b;
  border-radius: 15px;
  overflow: hidden;
}

.matchCard img {
  width: 100%;
}

.matchCard p {
  text-align: center;
  padding: 10px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1d1f3a;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

/* MATCH DETAILS */
.matchBox {
  background: #3a3d6b;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px cyan;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.joinBtn {
  width: 100%;
  padding: 12px;
  background: cyan;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
}

.timer {
  margin-top: 5px;
  color: yellow;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div class="walletBox">₹ 0</div>
</div>

<!-- HOME -->
<div id="home">

  <div class="banner">
    <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
  </div>

  <h2 class="sectionTitle">Select Match Type</h2>

  <div class="matchGrid">

    <div class="matchCard" onclick="openMatch('lonewolf')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('fullmap')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Full map 2.0</p>
    </div>

    <div class="matchCard" onclick="openMatch('lonewolf')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('fullmap')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Full map 2.0</p>
    </div>

  </div>

</div>

<!-- MATCH DETAILS -->
<div id="matchDetails" style="display:none; padding:15px;">

  <div onclick="goBack()">← Back</div>

  <h2 id="matchTitle"></h2>

  <div id="matchList"></div>

</div>

<!-- NAVBAR -->
<div class="navbar">
  <div>🏠 Home</div>
  <div>🎮 Matches</div>
  <div>💰 Wallet</div>
  <div>⚙️ Settings</div>
</div>

<!-- SCRIPT -->
<script>

let joinedMatch = null;

function openMatch(type) {
  document.getElementById("home").style.display = "none";
  document.getElementById("matchDetails").style.display = "block";

  let matches = [];

  if(type === "lonewolf"){
    document.getElementById("matchTitle").innerText = "Lone Wolf 1v1";

    matches = [
      {
        id:1,
        name:"Match 1",
        prize:55,
        kill:0,
        entry:10,
        type:"Solo",
        version:"TPP",
        map:"Lone Wolf",
        time:"02:45 PM",
        room:"123456",
        pass:"abc123"
      },
      {
        id:2,
        name:"Match 2",
        prize:100,
        kill:10,
        entry:20,
        type:"Solo",
        version:"TPP",
        map:"Lone Wolf",
        time:"03:00 PM",
        room:"789012",
        pass:"xyz789"
      }
    ];

  } else {
    document.getElementById("matchTitle").innerText = "Full Map";

    matches = [
      {
        id:3,
        name:"Match 1",
        prize:200,
        kill:20,
        entry:50,
        type:"Squad",
        version:"TPP",
        map:"Bermuda",
        time:"04:00 PM",
        room:"999999",
        pass:"pass999"
      }
    ];
  }

  let html = "";

  matches.forEach(m => {
    html += `
    <div class="matchBox">
      <h3>${m.name}</h3>

      <div class="row"><span>Time</span><span>${m.time}</span></div>
      <div class="row"><span>Prize Pool</span><span>₹ ${m.prize}</span></div>
      <div class="row"><span>Per Kill</span><span>₹ ${m.kill}</span></div>
      <div class="row"><span>Entry Fee</span><span>₹ ${m.entry}</span></div>
      <div class="row"><span>Type</span><span>${m.type}</span></div>
      <div class="row"><span>Version</span><span>${m.version}</span></div>
      <div class="row"><span>Map</span><span>${m.map}</span></div>

      <div id="timer${m.id}" class="timer"></div>

      <button class="joinBtn" onclick="joinMatch(${m.id})">Join Match</button>

      <button class="joinBtn" style="background:#555;" onclick="toggleDetails(${m.id}, '${m.room}', '${m.pass}')">Details</button>

      <div id="details${m.id}" style="display:none;margin-top:10px;"></div>

    </div>
    `;
  });

  document.getElementById("matchList").innerHTML = html;
}

function joinMatch(id) {
  if(joinedMatch !== null){
    alert("Already joined a match!");
    return;
  }

  joinedMatch = id;

  let time = 60;

  let timer = setInterval(() => {
    time--;

    document.getElementById("timer"+id).innerText = "Starts in: " + time + " sec";

    if(time <= 0){
      clearInterval(timer);
      document.getElementById("timer"+id).innerText = "Match Started!";
    }

  },1000);
}

function toggleDetails(id, room, pass) {
  let box = document.getElementById("details"+id);

  if(box.style.display === "none"){
    box.style.display = "block";
    box.innerHTML = "Room ID: " + room + "<br>Password: " + pass;
  } else {
    box.style.display = "none";
  }
}

function goBack(){
  document.getElementById("home").style.display = "block";
  document.getElementById("matchDetails").style.display = "none";
}

</script>

</body>
</html>
