<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1d1f3a,#2b2e5a);
  color: white;
  padding-bottom: 120px; /* 🔥 FIX */
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

.walletBox {
  border: 2px solid cyan;
  border-radius: 20px;
  padding: 5px 12px;
}

.joinBtn {
  width: 100%;
  padding: 12px;
  background: cyan;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
}

.navbar {
  position: fixed;
  bottom: 60px; /* 🔥 ads fix */
  width: 100%;
  background: #1d1f3a;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}
</style>
</head>

<body>

<script>
// ✅ FIXED LOGIN CHECK
if(!localStorage.getItem("login")){
  window.location.href = "login.html";
}
</script>

<div class="header">
  <div>🔥 Agent X eSports</div>
  <div>
    <span class="walletBox" id="walletBalance">₹ 0</span>
    <span onclick="logout()" style="cursor:pointer;">🚪</span>
  </div>
</div>

<div style="padding:15px;">
  <button class="joinBtn" onclick="deposit()">Deposit</button>
  <button class="joinBtn" onclick="withdraw()">Withdraw</button>
</div>

<div id="adminPanel" style="padding:15px; display:none;">
  <h3>Admin Panel</h3>
  <div id="requests"></div>
</div>

<div class="navbar">
  <div onclick="location.reload()">🏠 Home</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbEHxzNCGHbCYFDESVX_qtaoiO2e0qMyM",
  authDomain: "agent-x-d7f22.firebaseapp.com",
  projectId: "agent-x-d7f22",
  storageBucket: "agent-x-d7f22.firebasestorage.app",
  messagingSenderId: "1055506789692",
  appId: "1:1055506789692:web:72a9df8c2cf9a57c92da39"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ USER ID FIX
let userId = localStorage.getItem("userId");
if(!userId){
  userId = "user_" + Date.now();
  localStorage.setItem("userId", userId);
}

// ✅ WALLET LOAD
async function loadWallet(){
  try{
    const ref = doc(db, "wallets", userId);
    const snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("walletBalance").innerText = "₹ " + snap.data().balance;
    } else {
      await setDoc(ref, { balance: 0 });
      document.getElementById("walletBalance").innerText = "₹ 0";
    }
  }catch(err){
    console.log(err);
    alert("Wallet load error ❌");
  }
}
loadWallet();

// ✅ DEPOSIT
window.deposit = async function(){
  let amt = prompt("Enter Amount");
  if(!amt || amt<=0) return alert("Invalid amount ❌");

  await addDoc(collection(db, "requests"), {
    userId,
    type: "deposit",
    amount: Number(amt),
    status: "pending"
  });

  alert("Deposit Request Sent ✅");
}

// ✅ WITHDRAW
window.withdraw = async function(){
  let amt = prompt("Enter Amount");
  if(!amt || amt<=0) return alert("Invalid amount ❌");

  const ref = doc(db, "wallets", userId);
  const snap = await getDoc(ref);

  let bal = snap.exists() ? snap.data().balance : 0;

  if(amt > bal) return alert("Insufficient Balance ❌");

  await addDoc(collection(db, "requests"), {
    userId,
    type: "withdraw",
    amount: Number(amt),
    status: "pending"
  });

  alert("Withdraw Request Sent ✅");
}

// ✅ ADMIN PANEL
if(localStorage.getItem("role")==="admin"){
  document.getElementById("adminPanel").style.display="block";
  loadRequests();
}

// ✅ LOAD REQUESTS
async function loadRequests(){
  let snap = await getDocs(collection(db, "requests"));
  let box = document.getElementById("requests");
  box.innerHTML = "";

  snap.forEach(docSnap=>{
    let d = docSnap.data();

    box.innerHTML += `
    <div style="background:#333;margin:10px;padding:10px;border-radius:10px;">
      ₹${d.amount} (${d.type}) - ${d.status}
      ${d.status === "pending" ? 
      `<button onclick="approve('${docSnap.id}','${d.userId}',${d.amount},'${d.type}')">Approve</button>` : 
      `<span style="color:lightgreen;">✔ Approved</span>`}
    </div>`;
  });
}

// ✅ APPROVE
window.approve = async function(id, uid, amt, type){

  const reqRef = doc(db,"requests",id);
  await updateDoc(reqRef,{status:"approved"});

  const walletRef = doc(db,"wallets",uid);
  const snap = await getDoc(walletRef);

  let bal = snap.exists() ? snap.data().balance : 0;

  if(type==="deposit") bal += amt;
  else bal -= amt;

  await setDoc(walletRef,{balance:bal});

  alert("Approved ✅");

  loadRequests();
  loadWallet();
}

// ✅ LOGOUT
window.logout = function(){
  localStorage.clear();
  window.location.href="login.html";
}

</script>

</body>
</html>
