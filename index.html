<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1c1c3c,#2b2b5c);
  color: white;
  padding-bottom: 90px;
  scroll-behavior: smooth;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  margin-top: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.walletBox {
  border: 2px solid cyan;
  padding: 5px 12px;
  border-radius: 20px;
}

/* BANNER */
.banner {
  margin: 12px;
  height: 150px;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 20px;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INSTRUCTIONS */
.instructionsBox {
  width: calc(100% - 30px);
  margin: 0 auto 15px;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  font-size: 13px;
  color: #eee;
  box-shadow: 0 0 10px rgba(0,255,255,0.3);
}

/* TITLE */
.sectionTitle {
  text-align: center;
  margin: 10px 0;
}

/* GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 0 15px;
  margin-bottom: 110px;
}

/* CARD */
.matchCard {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.matchCard:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px cyan;
}

.matchCard img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

.matchCard p {
  padding: 12px;
}

/* MATCH PAGE */
.matchScreen {
  display: none;
  padding: 15px;
}

.matchBox {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

.backBtn {
  cursor: pointer;
  margin-bottom: 10px;
}

/* BOTTOM NAV */
.bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1c1c3c;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-top: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 Agent X eSports</div>
  <div class="walletBox">₹ 0</div>
</div>

<!-- HOME -->
<div id="home">

  <div class="banner">
    <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
  </div>

  <div class="instructionsBox">
    <b>Instructions:</b><br>
    • Wallet me balance hona chahiye<br>
    • Late entry = no refund<br>
    • Room details match se pehle milenge
  </div>

  <h2 class="sectionTitle">Select Match Type</h2>

  <div class="matchGrid">

    <div class="matchCard" onclick="openMatch('Lone Wolf 1v1')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('Full Map 2.0')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Full map 2.0</p>
    </div>

    <div class="matchCard" onclick="openMatch('Class Squad 1v1')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Class squad (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('Class Squad 2v2')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Class squad (2v2)</p>
    </div>

  </div>
</div>

<!-- MATCH SCREEN -->
<div id="matchScreen" class="matchScreen">
  <div class="backBtn" onclick="goBack()">⬅ Back</div>
  <h2 id="matchTitle"></h2>
  <div id="matchList"></div>
</div>

<script>

function openMatch(name){
  document.getElementById("home").style.display="none";
  document.getElementById("matchScreen").style.display="block";

  document.getElementById("matchTitle").innerText = name;

  let data = {
    "Lone Wolf 1v1":[
      {title:"Match #1", fee:10, prize:20}
    ],
    "Full Map 2.0":[],
    "Class Squad 1v1":[
      {title:"Match #2", fee:15, prize:30}
    ],
    "Class Squad 2v2":[]
  };

  let matches = data[name];
  let html = "";

  if(matches.length==0){
    html = `<div class="matchBox">
      <h3>${name}</h3>
      <p>Entry Fee: ₹ **</p>
      <p>Prize: ₹ **</p>
    </div>`;
  } else {
    matches.forEach(m=>{
      html += `<div class="matchBox">
        <h3>${m.title}</h3>
        <p>Entry Fee: ₹ ${m.fee}</p>
        <p>Prize: ₹ ${m.prize}</p>
      </div>`;
    });
  }

  document.getElementById("matchList").innerHTML = html;
}

function goBack(){
  document.getElementById("home").style.display="block";
  document.getElementById("matchScreen").style.display="none";
}

</script>

</body>
</html>
