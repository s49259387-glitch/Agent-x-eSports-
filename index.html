<!DOCTYPE html>
<html>
<head>
<title>Agent X</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f2fe,#4facfe);
  color:white;
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<b>🔥 Agent X</b>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
👤 <span id="email"></span>
</div>

<div class="card">
💰 Wallet: ₹<span id="wallet">0</span>
</div>

<div class="card">
<h3>🎮 Matches</h3>
<div id="matches"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBWJuXY8A2jKKBrW4CnLdfU3Spx2U4GUU0",
  authDomain: "battle-x-agent.firebaseapp.com",
  projectId: "battle-x-agent"
};

firebase.initializeApp(firebaseConfig);

let currentUser;

// LOGIN CHECK
firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location.href="login.html";
  }else{
    currentUser = user;
    document.getElementById("email").innerText = user.email;
    loadUser();
    loadMatches();
  }
});

// USER DATA
function loadUser(){
let ref = firebase.firestore().collection("users").doc(currentUser.uid);

ref.get().then(doc=>{
if(!doc.exists){
ref.set({wallet:100});
document.getElementById("wallet").innerText=100;
}else{
document.getElementById("wallet").innerText=doc.data().wallet;
}
});
}

// 🔥 MATCH LOAD WITH JOIN FIX + TIMER
function loadMatches(){
let box = document.getElementById("matches");

firebase.firestore().collection("matches").onSnapshot(snap=>{
box.innerHTML="";

snap.forEach(doc=>{
let m = doc.data();

let joined = false;

if(m.players){
m.players.forEach(p=>{
if(p.uid === currentUser.uid){
joined = true;
}
});
}

box.innerHTML += `
<div class="card">

<b>${m.title}</b><br>
₹${m.entry} → ₹${m.prize}<br>

<div id="timer_${doc.id}" style="color:cyan;margin-top:5px;">⏱ Loading...</div>

${
joined
? `<button disabled style="background:gray;">Joined ✅</button>`
: `<button onclick="joinMatch('${doc.id}', ${m.entry}, '${m.title}')">Join</button>`
}

</div>
`;

startTimer(doc.id, m.time);

});
});
}

// JOIN MATCH
function joinMatch(id, entry){

let matchRef = firebase.firestore().collection("matches").doc(id);
let userRef = firebase.firestore().collection("users").doc(currentUser.uid);

userRef.get().then(u=>{
let bal = u.data().wallet;

if(bal < entry){
alert("Low Balance");
return;
}

let newBal = bal - entry;
userRef.update({wallet:newBal});
document.getElementById("wallet").innerText=newBal;

matchRef.get().then(doc=>{
let players = doc.data().players || [];

players.push({
uid: currentUser.uid,
email: currentUser.email
});

matchRef.update({players:players});

alert("Joined ✅");

});
});
}

// 🔥 TIMER FUNCTION
function startTimer(id, matchTime){

if(!matchTime) return;

let timerBox = document.getElementById("timer_"+id);

let x = setInterval(function(){

let now = new Date().getTime();
let diff = matchTime - now;

if(diff <= 0){
timerBox.innerHTML = "🔥 Match Started";
clearInterval(x);
return;
}

let min = Math.floor(diff / (1000*60));
let sec = Math.floor((diff % (1000*60)) / 1000);

timerBox.innerHTML = "⏱ " + min + "m " + sec + "s";

},1000);

}

// LOGOUT
function logout(){
firebase.auth().signOut().then(()=>{
window.location.href="login.html";
});
}

</script>

</body>
</html>
