<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(#1e1e3f,#2b2b5f);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  font-size: 18px;
}

.walletBox {
  border: 2px solid cyan;
  padding: 5px 12px;
  border-radius: 20px;
}

/* BANNER */
.banner {
  margin: 12px;
  height: 180px;
  border-radius: 20px;
  overflow: hidden;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INSTRUCTIONS */
.instructionsBox {
  margin: 15px;
  padding: 14px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  box-shadow: 0 0 12px cyan;
}

/* TITLE */
.sectionTitle {
  text-align: center;
  font-size: 22px;
  margin-top: 10px;
}

/* MATCH CARD NEW */
.matchDetailsCard {
  background: rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 16px;
  margin: 15px;
  color: #fff;
  box-shadow: 0 0 15px cyan;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from { box-shadow: 0 0 10px cyan; }
  to { box-shadow: 0 0 20px cyan; }
}

.matchRow {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.matchTitle {
  font-size: 18px;
  font-weight: bold;
}

.joinBtn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  background: cyan;
  border: none;
  font-weight: bold;
  margin-top: 10px;
}

/* BOTTOM NAV */
.bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #1e1e3f;
  padding: 10px 0;
}

.bottomNav div {
  text-align: center;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div class="walletBox">₹ <span id="topBalance">0</span></div>
</div>

<!-- HOME -->
<div id="home">

  <!-- BANNER -->
  <div class="banner">
    <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
  </div>

  <!-- INSTRUCTIONS -->
  <div class="instructionsBox">
    <b>Instructions:</b><br>
    • Wallet me balance hona chahiye<br>
    • No refund<br>
    • Room details match se pehle milenge
  </div>

  <h2 class="sectionTitle">Select Match Type</h2>

  <!-- MATCH LIST -->
  <div id="matchList"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bottomNav">
  <div>🏠<br>Home</div>
  <div>🎮<br>Matches</div>
  <div onclick="openWallet()">💰<br>Wallet</div>
  <div>⚙️<br>Settings</div>
</div>

<script>

// WALLET INIT
let balance = localStorage.getItem("balance");
if (!balance) {
  balance = 0;
  localStorage.setItem("balance", 0);
}
document.getElementById("topBalance").innerText = balance;

// MATCH DATA
const matches = [
  {
    title: "Match 1",
    prize: 55,
    perKill: 0,
    entry: 10,
    type: "Solo",
    version: "TPP",
    map: "Lone Wolf"
  },
  {
    title: "Match 2",
    prize: 100,
    perKill: 5,
    entry: 20,
    type: "Solo",
    version: "TPP",
    map: "Bermuda"
  }
];

// LOAD MATCHES
function loadMatches() {
  let html = "";

  matches.forEach(match => {
    html += `
      <div class="matchDetailsCard">

        <div class="matchTitle">${match.title}</div>

        <div class="matchRow">
          <span>Prize Pool</span>
          <span>₹ ${match.prize}</span>
        </div>

        <div class="matchRow">
          <span>Per Kill</span>
          <span>₹ ${match.perKill}</span>
        </div>

        <div class="matchRow">
          <span>Entry Fee</span>
          <span>₹ ${match.entry}</span>
        </div>

        <div class="matchRow">
          <span>Type</span>
          <span>${match.type}</span>
        </div>

        <div class="matchRow">
          <span>Version</span>
          <span>${match.version}</span>
        </div>

        <div class="matchRow">
          <span>Map</span>
          <span>${match.map}</span>
        </div>

        <button class="joinBtn" onclick="joinMatch(${match.entry})">
          Join Match
        </button>

      </div>
    `;
  });

  document.getElementById("matchList").innerHTML = html;
}

// JOIN MATCH
function joinMatch(entryFee) {
  let balance = parseInt(localStorage.getItem("balance")) || 0;

  if (balance >= entryFee) {
    balance -= entryFee;
    localStorage.setItem("balance", balance);

    alert("Match Joined ✅");

    document.getElementById("topBalance").innerText = balance;

  } else {
    alert("Insufficient Balance ❌");
  }
}

// WALLET OPEN
function openWallet() {
  let amount = prompt("Enter amount to add:");
  if (amount) {
    let bal = parseInt(localStorage.getItem("balance")) || 0;
    bal += parseInt(amount);
    localStorage.setItem("balance", bal);
    document.getElementById("topBalance").innerText = bal;
  }
}

// INIT
loadMatches();

</script>

</body>
</html>
