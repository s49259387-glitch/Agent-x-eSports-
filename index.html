<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1c1c3c,#2b2b5c);
  color: white;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 15px 12px;
  margin-top: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.logo {
  font-size: 20px;
  font-weight: bold;
}

.walletBox {
  border: 2px solid cyan;
  padding: 5px 10px;
  border-radius: 20px;
}

/* BANNER */
.banner img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 15px;
}

/* CARD */
.card {
  margin: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
}

/* MATCH GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 10px;
}

/* MATCH CARD */
.matchCard {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
}

.matchCard img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

.matchCard p {
  padding: 8px;
  font-weight: bold;
  margin: 0;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 Agent X eSports</div>
  <div class="walletBox">₹ <span id="wallet">0</span></div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
</div>

<!-- USER -->
<div class="card">
  👤 <span id="email">abc@gmail.com</span>
</div>

<!-- MATCHES -->
<div class="card">
  <h3>🎮 Matches</h3>

  <div class="matchGrid">

    <!-- CARD 1 -->
    <div class="matchCard">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <!-- CARD 2 -->
    <div class="matchCard">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Full map 2.0</p>
    </div>

  </div>
</div>

</body>
</html>
