<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1c1c3c,#2b2b5c);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  margin-top: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.walletBox {
  border: 2px solid cyan;
  padding: 5px 10px;
  border-radius: 20px;
}
.banner {
  padding: 10px;
}

.banner img {
  width: 100%;
  height: 180px;
  object-fit: cover;   /* sabse important */
  object-position: center; /* center me focus */
  border-radius: 20px;
  display: block;
}

/* MATCH GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
}

/* CARD */
.matchCard {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
}

.matchCard img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

.matchCard p {
  padding: 8px;
  font-weight: bold;
}

/* MATCH SCREEN */
.matchScreen {
  display: none;
  padding: 15px;
}

.matchBox {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

.backBtn {
  margin-bottom: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 Agent X eSports</div>
  <div class="walletBox">₹ 0</div>
</div>

<!-- HOME SCREEN -->
<div id="home">

  <!-- BANNER -->
  <div class="banner">
    <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
  </div>

  <!-- MATCHES -->
  <div class="matchGrid">

    <div class="matchCard" onclick="openMatch('Lone Wolf 1v1')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('Full Map 2.0')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Full map 2.0</p>
    </div>

    <div class="matchCard" onclick="openMatch('Class Squad 1v1')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Class squad (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('Class Squad 2v2')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Class squad (2v2)</p>
    </div>

  </div>
</div>

<!-- MATCH SCREEN -->
<div id="matchScreen" class="matchScreen">
  <div class="backBtn" onclick="goBack()">⬅ Back</div>

  <h2 id="matchTitle"></h2>

  <!-- MATCH LIST -->
  <div id="matchList"></div>
</div>

<script>

function openMatch(name){
  document.getElementById("home").style.display="none";
  document.getElementById("matchScreen").style.display="block";

  document.getElementById("matchTitle").innerText = name;

  let data = {
    "Lone Wolf 1v1":[
      {title:"Match #1", fee:10, prize:20},
      {title:"Match #2", fee:15, prize:30}
    ],
    "Full Map 2.0":[],
    "Class Squad 1v1":[
      {title:"Match #3", fee:20, prize:40}
    ],
    "Class Squad 2v2":[]
  };

  let matches = data[name];
  let html="";

  if(matches.length==0){
    html = `<div class="matchBox">
      <h3>${name}</h3>
      <p>Entry Fee: ₹ **</p>
      <p>Prize: ₹ **</p>
    </div>`;
  } else {
    matches.forEach(m=>{
      html += `<div class="matchBox">
        <h3>${m.title}</h3>
        <p>Entry Fee: ₹ ${m.fee}</p>
        <p>Prize: ₹ ${m.prize}</p>
      </div>`;
    });
  }

  document.getElementById("matchList").innerHTML = html;
}

function goBack(){
  document.getElementById("home").style.display="block";
  document.getElementById("matchScreen").style.display="none";
}

</script>

</body>
</html>
