<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg,#1e1b4b,#312e81);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  align-items: center;
}

.logo {
  font-size: 18px;
  font-weight: bold;
}

.walletBox {
  border: 1px solid #00e5ff;
  padding: 6px 12px;
  border-radius: 20px;
}

/* BANNER */
.banner img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}

/* MATCH GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 10px;
}

/* MATCH CARD */
.matchCard {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.matchCard:hover {
  transform: scale(1.05);
}

.matchCard img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.matchCard p {
  padding: 8px;
  font-weight: bold;
}

/* USER */
.userIcon {
  margin-right: 5px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 Agent X eSports</div>
  <div class="walletBox">₹ <span id="wallet">95</span></div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
</div>

<!-- USER -->
<div class="card">
  👤 <span id="email">abc@gmail.com</span>
</div>

<!-- MATCHES -->
<div class="card">
  <h3>🎮 Matches</h3>

  <div class="matchGrid">

    <!-- CARD 1 -->
    <div class="matchCard" onclick="openMatch('lonewolf')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <!-- CARD 2 -->
    <div class="matchCard" onclick="openMatch('fullmap')">
      <img src="https://via.placeholder.com/300x150">
      <p>Full map 2.0</p>
    </div>

  </div>
</div>

<script>
function openMatch(type) {
  if(type === "lonewolf") {
    alert("Lone Wolf match details (Admin control later)");
  }
  if(type === "fullmap") {
    alert("Full Map 2.0 details");
  }
}
</script>

</body>
</html>
