<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1d1f3a,#2b2e5a);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

.walletBox {
  border: 2px solid cyan;
  border-radius: 20px;
  padding: 5px 12px;
}

/* BANNER */
.banner img {
  width: 100%;
  border-radius: 15px;
}

/* TITLE */
.sectionTitle {
  text-align: center;
  margin: 20px 0;
}

/* MATCH GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
}

.matchCard {
  background: #3a3d6b;
  border-radius: 15px;
  overflow: hidden;
}

.matchCard img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.matchCard p {
  text-align: center;
  padding: 10px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1d1f3a;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

/* MATCH DETAILS */
.matchBox {
  background: #3a3d6b;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px cyan;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

/* BUTTON */
.joinBtn {
  width: 100%;
  padding: 12px;
  background: cyan;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* DETAILS BOX */
.detailsBox {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
}

/* TIMER */
.timer {
  text-align: center;
  margin-top: 10px;
  color: cyan;
}

/* SETTINGS PAGE */
.settingsPage {
  display: none;
  padding: 15px;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div class="walletBox">₹ 0</div>
</div>

<!-- HOME -->
<div id="home">
  <div class="banner">
    <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
  </div>

  <h2 class="sectionTitle">Select Match Type</h2>

  <div class="matchGrid">
    <div class="matchCard" onclick="openMatch('lonewolf')">
      <img src="https://i.ibb.co/3m7R8hZ/lonewolf.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('fullmap')">
      <img src="https://i.ibb.co/3m7R8hZ/lonewolf.jpg">
      <p>Full map 2.0</p>
    </div>
  </div>
</div>

<!-- MATCH DETAILS -->
<div id="matchDetails" style="display:none; padding:15px;">
  <div onclick="goBack()">← Back</div>
  <h2 id="matchTitle"></h2>
  <div id="matchList"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="settingsPage">
  <div onclick="goHome()">← Back</div>
  <h2>Settings</h2>

  <button class="joinBtn" onclick="logout()">Logout</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goMatches()">🎮 Matches</div>
  <div onclick="goWallet()">💰 Wallet</div>
  <div onclick="openSettings()">⚙️ Settings</div>
</div>

<script>

/* 🔐 LOGIN CHECK */
if(!localStorage.getItem("user")){
  window.location.href = "login.html";
}

/* NAVIGATION */
function goHome(){
  document.getElementById("home").style.display = "block";
  document.getElementById("matchDetails").style.display = "none";
  document.getElementById("settings").style.display = "none";
}

function goMatches(){
  alert("Select any match from home");
}

function goWallet(){
  alert("Wallet coming soon");
}

function openSettings(){
  document.getElementById("home").style.display = "none";
  document.getElementById("matchDetails").style.display = "none";
  document.getElementById("settings").style.display = "block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

/* MATCH SYSTEM */
function openMatch(type){
  document.getElementById("home").style.display = "none";
  document.getElementById("matchDetails").style.display = "block";

  let matches = [
    {name:"Match 1", prize:55, kill:0, entry:10},
    {name:"Match 2", prize:100, kill:10, entry:20}
  ];

  let html = "";

  matches.forEach((m,i)=>{
    html += `
    <div class="matchBox">
      <h3>${m.name}</h3>

      <div class="row"><span>Prize Pool</span><span>₹ ${m.prize}</span></div>
      <div class="row"><span>Per Kill</span><span>₹ ${m.kill}</span></div>
      <div class="row"><span>Entry Fee</span><span>₹ ${m.entry}</span></div>

      <button class="joinBtn" onclick="joinMatch(${i})">Join Match</button>

      <div id="timer${i}" class="timer"></div>

      <button class="joinBtn" onclick="showDetails(${i})">Details</button>

      <div id="details${i}" class="detailsBox">
        Room ID: 123456<br>
        Password: 9999
      </div>
    </div>
    `;
  });

  document.getElementById("matchList").innerHTML = html;
}

function goBack(){
  goHome();
}

/* JOIN */
function joinMatch(i){
  let time = 10;
  let timer = document.getElementById("timer"+i);

  let x = setInterval(()=>{
    timer.innerText = "Match starts in: "+time+"s";
    time--;

    if(time < 0){
      clearInterval(x);
      timer.innerText = "Match Started!";
    }
  },1000);
}

/* DETAILS */
function showDetails(i){
  let box = document.getElementById("details"+i);
  box.style.display = box.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
