<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1d1f3a,#2b2e5a);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

.walletBox {
  border: 2px solid cyan;
  border-radius: 20px;
  padding: 5px 12px;
}

/* BANNER */
.banner img {
  width: 100%;
  border-radius: 15px;
}

/* TITLE */
.sectionTitle {
  text-align: center;
  margin: 20px 0;
}

/* MATCH GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
}

.matchCard {
  background: #3a3d6b;
  border-radius: 15px;
  overflow: hidden;
}

.matchCard img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.matchCard p {
  text-align: center;
  padding: 10px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1d1f3a;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

/* MATCH DETAILS */
.matchBox {
  background: #3a3d6b;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px cyan;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.joinBtn {
  width: 100%;
  padding: 12px;
  background: cyan;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
  cursor: pointer;
}

.detailsBox {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
}

.timer {
  text-align: center;
  margin-top: 10px;
  color: cyan;
}

/* EXTRA PAGES */
.page {
  display: none;
  padding: 15px;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div class="walletBox" id="walletAmount">₹ 0</div>
</div>

<!-- HOME -->
<div id="home">

  <div class="banner">
    <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
  </div>

  <h2 class="sectionTitle">Select Match Type</h2>

  <div class="matchGrid">

    <div class="matchCard" onclick="openMatch('lonewolf')">
      <img src="https://i.imgur.com/7yUvePI.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('fullmap')">
      <img src="https://i.imgur.com/7yUvePI.jpg">
      <p>Full map 2.0</p>
    </div>

  </div>

</div>

<!-- MATCH DETAILS -->
<div id="matchDetails" class="page">
  <div onclick="goHome()">← Back</div>
  <h2 id="matchTitle"></h2>
  <div id="matchList"></div>
</div>

<!-- WALLET PAGE -->
<div id="walletPage" class="page">
  <div onclick="goHome()">← Back</div>
  <h2>Wallet</h2>
  <p>Balance: <span id="walletText">₹ 0</span></p>

  <button class="joinBtn" onclick="deposit()">Deposit ₹100</button>
  <button class="joinBtn" onclick="withdraw()">Withdraw ₹50</button>
</div>

<!-- SETTINGS PAGE -->
<div id="settingsPage" class="page">
  <div onclick="goHome()">← Back</div>
  <h2>Settings</h2>

  <p>Name: <span id="playerName">Player123</span></p>
  <button class="joinBtn" onclick="changeName()">Change Name</button>

  <button class="joinBtn" onclick="logout()">Logout</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goMatches()">🎮 Matches</div>
  <div onclick="goWallet()">💰 Wallet</div>
  <div onclick="goSettings()">⚙️ Settings</div>
</div>

<script>

let wallet = 0;

function showPage(page){
  document.getElementById("home").style.display = "none";
  document.getElementById("matchDetails").style.display = "none";
  document.getElementById("walletPage").style.display = "none";
  document.getElementById("settingsPage").style.display = "none";

  document.getElementById(page).style.display = "block";
}

function goHome(){
  showPage("home");
}

function goMatches(){
  alert("Matches coming soon");
}

function goWallet(){
  showPage("walletPage");
}

function goSettings(){
  showPage("settingsPage");
}

function deposit(){
  wallet += 100;
  updateWallet();
}

function withdraw(){
  wallet -= 50;
  if(wallet < 0) wallet = 0;
  updateWallet();
}

function updateWallet(){
  document.getElementById("walletText").innerText = "₹ " + wallet;
  document.getElementById("walletAmount").innerText = "₹ " + wallet;
}

function changeName(){
  let name = prompt("Enter new name:");
  if(name){
    document.getElementById("playerName").innerText = name;
  }
}

function logout(){
  alert("Logged out");
  window.location.href = "login.html";
}

/* MATCH SYSTEM SAME */
function openMatch(type){
  showPage("matchDetails");

  let matches = [
    {name:"Match 1", prize:55, kill:0, entry:10, type:"Solo", version:"TPP", map:"Lone Wolf"},
    {name:"Match 2", prize:100, kill:10, entry:20, type:"Solo", version:"TPP", map:"Lone Wolf"}
  ];

  let html = "";

  matches.forEach((m,i)=>{
    html += `
    <div class="matchBox">
      <h3>${m.name}</h3>
      <div class="row"><span>Prize</span><span>₹ ${m.prize}</span></div>
      <div class="row"><span>Entry</span><span>₹ ${m.entry}</span></div>
      <button class="joinBtn" onclick="joinMatch(${i})">Join Match</button>
      <div id="timer${i}" class="timer"></div>
    </div>
    `;
  });

  document.getElementById("matchList").innerHTML = html;
}

function joinMatch(i){
  let t = 10;
  let div = document.getElementById("timer"+i);

  let x = setInterval(()=>{
    div.innerText = "Starts in " + t;
    t--;
    if(t < 0){
      clearInterval(x);
      div.innerText = "Match Started!";
    }
  },1000);
}

</script>

</body>
</html>
