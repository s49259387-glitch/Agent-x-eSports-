<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(180deg,#1c1c3c,#2a2a5c);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.walletBox{
  border:1px solid #00eaff;
  padding:6px 15px;
  border-radius:20px;
}

/* BANNER */
.banner{
  padding:10px;
}

.banner img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:15px;
}

/* CARD */
.card{
  margin:15px;
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
}

/* MATCH CARD */
.match-card{
  background:#1f2a44;
  border-radius:15px;
  overflow:hidden;
  margin-top:10px;
}

.match-card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.match-info{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

.view-btn{
  width:90%;
  margin:10px auto 15px;
  display:block;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d4d;
  color:white;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 Agent X eSports</div>
  <div class="walletBox">₹ <span id="wallet">0</span></div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
</div>

<!-- USER -->
<div class="card">
  👤 <span id="email">abc@gmail.com</span>
</div>

<!-- MATCHES -->
<div class="card">
  <h3>🎮 Matches</h3>

  <div class="match-card" onclick="openMatch()">
    <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">

    <div class="match-info">
      Lone wolf (1v1)
    </div>

    <button class="view-btn">View Details</button>
  </div>

</div>

<script>
function openMatch(){
  alert("Match details next step me banaenge 🔥");
}
</script>

</body>
</html>
