<!DOCTYPE html>
<html>
<head>
<title>Agent X</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  padding-top:40px;
  padding-bottom:80px;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

*{ box-sizing:border-box; }

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.card{
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f2fe,#4facfe);
  color:white;
  width:100%;
  margin-top:10px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="header">
<b>🔥 Agent X</b>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
👤 <span id="email"></span>
</div>

<div class="card">
💰 Wallet: ₹<span id="wallet">0</span>
</div>

<div class="card">
<h3>🎮 Matches</h3>
<div id="matches"></div>
</div>

<div class="nav">
<div onclick="goHome()">🏠</div>
<div onclick="goWallet()">💰</div>
<div onclick="goProfile()">👤</div>
<div onclick="goMatches()">🎮</div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBWJuXY8A2jKKBrW4CnLdfU3Spx2U4GUU0",
  authDomain: "battle-x-agent.firebaseapp.com",
  projectId: "battle-x-agent"
};

firebase.initializeApp(firebaseConfig);

let currentUser;

firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location.href="login.html";
  }else{
    currentUser = user;
    document.getElementById("email").innerText = user.email;
    loadUser();
    loadMatches();
  }
});

function loadUser(){
let ref = firebase.firestore().collection("users").doc(currentUser.uid);

ref.get().then(doc=>{
if(!doc.exists){
ref.set({wallet:100});
document.getElementById("wallet").innerText=100;
}else{
document.getElementById("wallet").innerText=doc.data().wallet;
}
});
}

function loadMatches(){
let box = document.getElementById("matches");

firebase.firestore().collection("matches").onSnapshot(snap=>{
box.innerHTML="";

snap.forEach(doc=>{
let m = doc.data();

let joined = false;

if(m.players){
m.players.forEach(p=>{
if(p.uid === currentUser.uid){
joined = true;
}
});
}

box.innerHTML += `
<div class="card">

<b>${m.title}</b><br>
₹${m.entry} → ₹${m.prize}<br>

<div id="timer_${doc.id}" style="color:cyan;margin-top:5px;">⏱ Loading...</div>

${
joined
? `
<button onclick="toggleDetails('${doc.id}')">📄 Details</button>

<div id="details_${doc.id}" style="display:none;margin-top:10px;background:rgba(255,255,255,0.05);padding:10px;border-radius:10px;">

<p>🎯 Room ID: ${m.roomId ? m.roomId : "**************"}</p>
<button onclick="copyText('${m.roomId ? m.roomId : ""}')">Copy ID</button>

<p>🔑 Password: ${m.roomPass ? m.roomPass : "*****"}</p>
<button onclick="copyText('${m.roomPass ? m.roomPass : ""}')">Copy Pass</button>

</div>
`
: `<button onclick="joinMatch('${doc.id}', ${m.entry})">Join</button>`
}

</div>
`;

startTimer(doc.id, m.time);

});
});
}

function joinMatch(id, entry){

let matchRef = firebase.firestore().collection("matches").doc(id);
let userRef = firebase.firestore().collection("users").doc(currentUser.uid);

userRef.get().then(u=>{
let bal = u.data().wallet;

if(bal < entry){
alert("Low Balance");
return;
}

let newBal = bal - entry;
userRef.update({wallet:newBal});
document.getElementById("wallet").innerText=newBal;

matchRef.get().then(doc=>{
let players = doc.data().players || [];

players.push({
uid: currentUser.uid,
email: currentUser.email
});

matchRef.update({players:players});

alert("Joined ✅");

});
});
}

function startTimer(id, matchTime){
if(!matchTime) return;

let timerBox = document.getElementById("timer_"+id);

let x = setInterval(function(){

let now = new Date().getTime();
let diff = matchTime - now;

if(diff <= 0){
timerBox.innerHTML = "🔥 Match Started";
clearInterval(x);
return;
}

let min = Math.floor(diff / (1000*60));
let sec = Math.floor((diff % (1000*60)) / 1000);

timerBox.innerHTML = "⏱ " + min + "m " + sec + "s";

},1000);
}

// DETAILS
function toggleDetails(id){
let box = document.getElementById("details_"+id);
box.style.display = box.style.display === "none" ? "block" : "none";
}

// COPY
function copyText(text){
if(!text){
alert("Room not available yet ❌");
return;
}
navigator.clipboard.writeText(text);
alert("Copied ✅");
}

// NAV
function goHome(){ window.location.href="index.html"; }
function goWallet(){ window.location.href="wallet.html"; }
function goProfile(){ window.location.href="profile.html"; }
function goMatches(){ window.location.href="mymatch.html"; }

// LOGOUT
function logout(){
firebase.auth().signOut().then(()=>{
window.location.href="login.html";
});
}

</script>

</body>
</html>
