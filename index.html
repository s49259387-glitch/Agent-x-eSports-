<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1c1c3c, #2b2b5c);
  color: white;
}

/* HEADER FIX */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  margin-top: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.logo {
  font-size: 18px;
  font-weight: bold;
}

.walletBox {
  border: 2px solid cyan;
  padding: 5px 10px;
  border-radius: 20px;
}

/* BANNER */
.banner img {
  width: 100%;
  border-radius: 15px;
  margin: 10px 0;
}

/* SECTION */
.section {
  padding: 15px;
}

/* GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* CARD */
.matchCard {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
}

.matchCard img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.matchCard p {
  padding: 8px;
  font-size: 14px;
  font-weight: bold;
}

/* MATCH PAGE */
.matchPage {
  display: none;
  padding: 15px;
}

.matchBox {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.backBtn {
  margin-bottom: 10px;
  display: inline-block;
  cursor: pointer;
  color: cyan;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 Agent X eSports</div>
  <div class="walletBox">₹ 0</div>
</div>

<!-- HOME PAGE -->
<div id="homePage">

  <!-- BANNER -->
  <div class="section banner">
    <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
  </div>

  <!-- MATCHES -->
  <div class="section">
    <h3>🎮 Matches</h3>

    <div class="matchGrid">

      <div class="matchCard" onclick="openMatches('lonewolf')">
        <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
        <p>Lone wolf (1v1)</p>
      </div>

      <div class="matchCard" onclick="openMatches('fullmap')">
        <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
        <p>Full map 2.0</p>
      </div>

      <div class="matchCard" onclick="openMatches('cs1')">
        <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
        <p>Class squad (1v1)</p>
      </div>

      <div class="matchCard" onclick="openMatches('cs2')">
        <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
        <p>Class squad (2v2)</p>
      </div>

    </div>
  </div>
</div>

<!-- MATCH PAGE -->
<div id="matchPage" class="matchPage">
  <div class="backBtn" onclick="goBack()">⬅ Back</div>
  <h2 id="matchTitle"></h2>
  <div id="matchList"></div>
</div>

<script>

/* ADMIN CONTROL (YAHAN SE MATCH ADD KAR) */
const matchesData = {
  lonewolf: [
    {title:"1v1 Lone Wolf #1", prize:15, fee:10},
    {title:"1v1 Lone Wolf #2", prize:20, fee:15}
  ],

  fullmap: [],

  cs1: [
    {title:"CS 1v1 Match", prize:25, fee:5}
  ],

  cs2: []
};


/* OPEN MATCH PAGE */
function openMatches(type){
  document.getElementById("homePage").style.display="none";
  document.getElementById("matchPage").style.display="block";

  let title = {
    lonewolf:"Lone Wolf Matches",
    fullmap:"Full Map Matches",
    cs1:"Class Squad (1v1)",
    cs2:"Class Squad (2v2)"
  };

  document.getElementById("matchTitle").innerText = title[type];

  let data = matchesData[type];
  let html = "";

  if(data.length === 0){
    html += `
      <div class="matchBox">
        <h3>${title[type]}</h3>
        <p>Prize: ₹ **</p>
        <p>Entry Fee: ₹ **</p>
      </div>
    `;
  } else {
    data.forEach(m => {
      html += `
        <div class="matchBox">
          <h3>${m.title}</h3>
          <p>Prize: ₹ ${m.prize}</p>
          <p>Entry Fee: ₹ ${m.fee}</p>
        </div>
      `;
    });
  }

  document.getElementById("matchList").innerHTML = html;
}


/* BACK */
function goBack(){
  document.getElementById("homePage").style.display="block";
  document.getElementById("matchPage").style.display="none";
}

</script>

</body>
</html>
