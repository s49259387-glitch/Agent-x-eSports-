<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1d1f3a,#2b2e5a);
  color: white;
  padding-bottom: 70px;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

.walletBox {
  border: 2px solid cyan;
  border-radius: 20px;
  padding: 5px 12px;
}

.banner img {
  width: 100%;
  border-radius: 15px;
}

.sectionTitle {
  text-align: center;
  margin: 20px 0;
}

.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
}

.matchCard {
  background: #3a3d6b;
  border-radius: 15px;
  overflow: hidden;
}

.matchCard img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.matchCard p {
  text-align: center;
  padding: 10px;
}

.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1d1f3a;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.matchBox {
  background: #3a3d6b;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 15px cyan;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.joinBtn {
  width: 100%;
  padding: 12px;
  background: cyan;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  font-weight: bold;
}

.detailsBox {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
}

.timer {
  text-align: center;
  margin-top: 10px;
  color: cyan;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN CHECK -->
<script>
if(localStorage.getItem("login") !== "yes"){
  window.location.href = "login.html";
}
</script>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div>
    <span class="walletBox">₹ 0</span>
    <span onclick="logout()" style="margin-left:10px;cursor:pointer;">🚪</span>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <div class="banner">
    <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png">
  </div>

  <h2 class="sectionTitle">Select Match Type</h2>

  <div class="matchGrid">
    <div class="matchCard" onclick="openMatch()">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch()">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Full map 2.0</p>
    </div>
  </div>
</div>

<!-- MATCH DETAILS -->
<div id="matchDetails" style="display:none; padding:15px;">
  <div onclick="goHome()">← Back</div>

  <div class="matchBox">
    <h3>Match 1</h3>

    <div class="row"><span>Prize Pool</span><span>₹ 55</span></div>
    <div class="row"><span>Per Kill</span><span>₹ 0</span></div>
    <div class="row"><span>Entry Fee</span><span>₹ 10</span></div>

    <button class="joinBtn" onclick="joinMatch()">Join Match</button>

    <div id="timer" class="timer"></div>

    <button class="joinBtn" onclick="toggleDetails()">Details</button>

    <div id="details" class="detailsBox">
      Room ID: 123456<br>
      Password: 9999
    </div>
  </div>
</div>

<!-- WALLET -->
<div id="walletPage" style="display:none; padding:15px;">
  <div onclick="goHome()">← Back</div>

  <h2>Wallet</h2>

  <button class="joinBtn" onclick="toggleDeposit()">Deposit</button>

  <div id="depositBox" style="display:none; text-align:center; margin-top:15px;">

    <input type="number" id="amount" placeholder="Enter Amount"
    style="width:80%; padding:10px; border-radius:8px; border:none;">

    <div id="qrBox" style="display:none; margin-top:15px;">
      <p>Scan & Pay</p>

      <img src="https://i.postimg.cc/PrJF6wH6/Screenshot-20260409-163237.jpg"
      style="width:220px; border-radius:10px; display:block; margin:auto;">

      <p>UPI ID: 7985393071-k62e@ybl</p>
      <p>Name: DURGESH SHARMA</p>

      <button class="joinBtn" onclick="sendDeposit()">Send Request</button>
    </div>

  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="openMatch()">🎮 Matches</div>
  <div onclick="openWallet()">💰 Wallet</div>

  <!-- 👇 ADMIN BUTTON -->
  <div id="adminPanelBtn" onclick="openAdmin()" style="display:none;">👑 Admin</div>

  <div onclick="alert('Settings coming soon')">⚙️ Settings</div>
</div>

<script>

function logout(){
  localStorage.removeItem("login");
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

/* 👇 ADMIN SHOW LOGIC */
let role = localStorage.getItem("role");

window.onload = function(){
  if(role === "admin"){
    document.getElementById("adminPanelBtn").style.display = "block";
  }
};

function openAdmin(){
  alert("Admin Panel Coming Soon 🔥");
}

function openMatch(){
  document.getElementById("home").style.display="none";
  document.getElementById("matchDetails").style.display="block";
  document.getElementById("walletPage").style.display="none";
}

function goHome(){
  document.getElementById("home").style.display="block";
  document.getElementById("matchDetails").style.display="none";
  document.getElementById("walletPage").style.display="none";
}

function openWallet(){
  document.getElementById("home").style.display="none";
  document.getElementById("matchDetails").style.display="none";
  document.getElementById("walletPage").style.display="block";
}

function joinMatch(){
  let time=10;
  let timer=document.getElementById("timer");

  let interval=setInterval(()=>{
    timer.innerText="Match starts in: "+time+"s";
    time--;
    if(time<0){
      clearInterval(interval);
      timer.innerText="Match Started!";
    }
  },1000);
}

function toggleDetails(){
  let box=document.getElementById("details");
  box.style.display=box.style.display==="block"?"none":"block";
}

function toggleDeposit(){
  let box=document.getElementById("depositBox");
  box.style.display=box.style.display==="block"?"none":"block";
}

document.getElementById("amount").addEventListener("input", function(){
  let amt=this.value;
  document.getElementById("qrBox").style.display = amt>0 ? "block" : "none";
});

function sendDeposit(){
  let amt=document.getElementById("amount").value;

  if(amt=="" || amt<=0){
    alert("Enter valid amount");
    return;
  }

  let data=JSON.parse(localStorage.getItem("deposit_requests")) || [];

  data.push({amount:amt,status:"pending"});

  localStorage.setItem("deposit_requests",JSON.stringify(data));

  alert("Request sent to admin ✅");
}

</script>

</body>
</html>
