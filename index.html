<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1c1c3c,#2b2b5c);
  color: white;
  padding-bottom: 90px;
  padding-top: env(safe-area-inset-top);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 15px 10px;
  margin-top: 5px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.walletBox {
  border: 2px solid cyan;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: bold;
}

/* BANNER FIX */
.banner {
  width: 100%;
  height: 180px;
  margin: 12px;
  border-radius: 20px;
  overflow: hidden;
  background: #000;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}

/* INSTRUCTIONS */
.instructionsBox {
  margin: 15px;
  padding: 14px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  box-shadow: 0 0 12px cyan;
}

/* TITLE */
.sectionTitle {
  text-align: center;
  margin-top: 10px;
}

/* GRID */
.matchGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

/* CARD */
.matchCard {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.matchCard:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px cyan;
}

.matchCard img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.matchCard p {
  padding: 10px;
}

/* MATCH SCREEN */
.matchScreen {
  display: none;
  padding: 15px;
}

.matchBox {
  background: white;
  color: black;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* WALLET SCREEN */
#walletScreen {
  display: none;
  padding: 20px;
}

/* BOTTOM NAV */
.bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1c1c3c;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  font-size: 14px;
}

.bottomNav div {
  text-align: center;
  cursor: pointer;
}

/* IMAGE GLOBAL FIX */
img {
  vertical-align: middle;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div class="walletBox">₹ <span id="topBalance">0</span></div>
</div>

<!-- HOME -->
<div id="home">

  <div class="banner">
  <img src="https://i.postimg.cc/htcg0Zd2/file-000000009a8c7208a5891d21e8cc7c9c.png" alt="Banner">
</div>


  <div class="instructionsBox">
    <b>Instructions:</b><br>
    • Wallet me balance hona chahiye<br>
    • No refund<br>
    • Room details match se pehle milenge
  </div>

  <h2 class="sectionTitle">Select Match Type</h2>

  <div class="matchGrid">

    <div class="matchCard" onclick="openMatch('Lone Wolf 1v1')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Lone wolf (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('Full Map 2.0')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Full map 2.0</p>
    </div>

    <div class="matchCard" onclick="openMatch('Class Squad 1v1')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Class squad (1v1)</p>
    </div>

    <div class="matchCard" onclick="openMatch('Class Squad 2v2')">
      <img src="https://i.ibb.co/sdYpQbFt/Screenshot-20260408-232023.jpg">
      <p>Class squad (2v2)</p>
    </div>

  </div>

</div>

<!-- MATCH SCREEN -->
<div id="matchScreen" class="matchScreen">
  <div onclick="goHome()">⬅ Back</div>
  <h2 id="matchTitle"></h2>
  <div id="matchList"></div>
</div>

<!-- WALLET SCREEN -->
<div id="walletScreen">

  <div onclick="goHome()">⬅ Back</div>

  <h2 style="text-align:center;">💰 My Wallet</h2>

  <div style="text-align:center; font-size:24px; margin:20px 0;">
    ₹ <span id="walletBalance">0</span>
  </div>

  <input type="number" id="amount" placeholder="Enter amount"
    style="width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:15px;">

  <button onclick="deposit()" 
    style="width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:10px; background:green; color:white;">
    Deposit
  </button>

  <button onclick="withdraw()" 
    style="width:100%; padding:12px; border:none; border-radius:10px; background:red; color:white;">
    Withdraw
  </button>

</div>

<!-- BOTTOM NAV -->
<div class="bottomNav">
  <div onclick="goHome()">🏠<br>Home</div>
  <div>🎮<br>Matches</div>
  <div onclick="openWallet()">💰<br>Wallet</div>
  <div>⚙️<br>Settings</div>
</div>

<script>

/* MATCH SYSTEM */
function openMatch(name){
  document.getElementById("home").style.display="none";
  document.getElementById("matchScreen").style.display="block";
  document.getElementById("walletScreen").style.display="none";

  document.getElementById("matchTitle").innerText = name;

  let data = {
    "Lone Wolf 1v1":[{title:"Match 1", fee:10, prize:20}],
    "Full Map 2.0":[],
    "Class Squad 1v1":[{title:"Match 2", fee:20, prize:40}],
    "Class Squad 2v2":[]
  };

  let matches = data[name];
  let html = "";

  if(matches.length==0){
    html = `<div class="matchBox">
      <h3>${name}</h3>
      <p>Entry Fee: ₹ **</p>
      <p>Prize: ₹ **</p>
    </div>`;
  } else {
    matches.forEach(m=>{
      html += `<div class="matchBox">
        <h3>${m.title}</h3>
        <p>Entry Fee: ₹ ${m.fee}</p>
        <p>Prize: ₹ ${m.prize}</p>
      </div>`;
    });
  }

  document.getElementById("matchList").innerHTML = html;
}

function goHome(){
  document.getElementById("home").style.display="block";
  document.getElementById("matchScreen").style.display="none";
  document.getElementById("walletScreen").style.display="none";
}

/* WALLET SYSTEM */
let balance = 0;

function openWallet(){
  document.getElementById("home").style.display="none";
  document.getElementById("matchScreen").style.display="none";
  document.getElementById("walletScreen").style.display="block";
}

function deposit(){
  let amt = document.getElementById("amount").value;

  if(amt && amt > 0){
    balance += parseInt(amt);
    updateBalance();
    alert("₹ " + amt + " Deposited");
  }
}

function withdraw(){
  let amt = document.getElementById("amount").value;

  if(amt && amt <= balance){
    balance -= parseInt(amt);
    updateBalance();
    alert("₹ " + amt + " Withdrawn");
  } else {
    alert("Insufficient Balance");
  }
}

function updateBalance(){
  document.getElementById("walletBalance").innerText = balance;
  document.getElementById("topBalance").innerText = balance;
}

</script>

</body>
</html>
