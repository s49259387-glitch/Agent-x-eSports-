<!DOCTYPE html>
<html>
<head>
<title>Agent X eSports</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
  padding-top:35px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
}

.logo{
  font-size:20px;
  font-weight:bold;
}

.walletBox{
  border:2px solid cyan;
  padding:5px 12px;
  border-radius:20px;
}

/* BANNER */
.banner{
  padding:10px;
}

.banner img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:15px;
}

/* CARD */
.card{
  background:#ffffff10;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

/* MATCH CARD */
.match-card{
  background:#1e293b;
  border-radius:15px;
  overflow:hidden;
  margin-top:10px;
}

.match-card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.match-info{
  padding:10px;
  text-align:center;
  font-weight:bold;
}

/* BUTTON */
.details-btn{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  font-size:16px;
}

/* DETAILS */
.details{
  display:none;
  padding:10px;
  text-align:center;
  font-size:14px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 Agent X eSports</div>
  <div class="walletBox">₹ <span id="wallet">0</span></div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://i.ibb.co/BHpsJ76Q/Screenshot-20260408-140953.jpg">
</div>

<!-- USER -->
<div class="card">
  👤 <span id="email">abc@gmail.com</span>
</div>

<!-- MATCHES -->
<div class="card">
  <h3>🎮 Matches</h3>

  <div class="match-card" onclick="toggleDetails()">
    <img src="https://i.ibb.co/BHpsJ76Q/Screenshot-20260408-140953.jpg">

    <div class="match-info">
      Lone wolf (1v1)
    </div>

    <button class="details-btn">View Details</button>

    <div class="details" id="details">
      Room ID: ******** <br>
      Password: ***** <br><br>
      Time: 8:00 PM <br>
      Entry: ₹5 → ₹8
    </div>
  </div>

</div>

<script>
function toggleDetails(){
  let d = document.getElementById("details");
  d.style.display = (d.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
