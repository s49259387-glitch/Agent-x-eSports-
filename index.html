<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent X eSports</title>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#1d1f3a,#2b2e5a);
  color: white;
  padding-bottom: 70px;
}
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}
.walletBox {
  border: 2px solid cyan;
  border-radius: 20px;
  padding: 5px 12px;
}
.joinBtn {
  width: 100%;
  padding: 12px;
  background: cyan;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1d1f3a;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}
.popup {
  position: fixed;
  top:0;left:0;width:100%;height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.popupBox {
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("login") !== "yes"){
  window.location.href = "login.html";
}
</script>

<!-- HEADER -->
<div class="header">
  <div>🔥 Agent X eSports</div>
  <div>
    <span class="walletBox" id="walletBalance">₹ 0</span>
    <span onclick="logout()">🚪</span>
  </div>
</div>

<!-- MATCH -->
<div style="padding:15px;">
  <h3>Match 1</h3>
  <button class="joinBtn" onclick="openJoinPopup()">Join Match</button>
</div>

<!-- WALLET -->
<div style="padding:15px;">
  <button class="joinBtn" onclick="toggleDeposit()">Deposit</button>
  <button class="joinBtn" onclick="toggleWithdraw()">Withdraw</button>

  <div id="depositBox" style="display:none;">
    <input id="amount" type="number" placeholder="Amount">
    <button class="joinBtn" onclick="sendDeposit()">Send Deposit</button>
  </div>

  <div id="withdrawBox" style="display:none;">
    <input id="withdrawAmount" type="number" placeholder="Withdraw Amount">
    <button class="joinBtn" onclick="sendWithdraw()">Send Withdraw</button>
  </div>
</div>

<!-- ADMIN -->
<div style="padding:15px;">
  <h3>Admin Panel</h3>
  <div id="requestList"></div>
</div>

<!-- JOIN POPUP -->
<div id="joinPopup" class="popup">
  <div class="popupBox">
    <h3>Enter Details</h3>
    <input id="uid" placeholder="Gaming UID"><br><br>
    <input id="gameName" placeholder="Game Name"><br><br>
    <button onclick="submitJoin()">Submit</button>
  </div>
</div>

<!-- NAV -->
<div class="navbar">
  <div onclick="location.reload()">🏠</div>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDbEHxzNCGHbCYFDESVX_qtaoiO2e0qMyM",
  authDomain: "agent-x-d7f22.firebaseapp.com",
  projectId: "agent-x-d7f22",
  storageBucket: "agent-x-d7f22.firebasestorage.app",
  messagingSenderId: "1055506789692",
  appId: "1:1055506789692:web:72a9df8c2cf9a57c92da39"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// WALLET INIT
if(!localStorage.getItem("wallet")){
  localStorage.setItem("wallet","0");
}

function updateWallet(){
  document.getElementById("walletBalance").innerText =
    "₹ "+localStorage.getItem("wallet");
}
updateWallet();

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

// TOGGLE
function toggleDeposit(){
  let b=document.getElementById("depositBox");
  b.style.display=b.style.display==="block"?"none":"block";
}
function toggleWithdraw(){
  let b=document.getElementById("withdrawBox");
  b.style.display=b.style.display==="block"?"none":"block";
}

// 💰 DEPOSIT
function sendDeposit(){
  let amt=document.getElementById("amount").value;
  if(amt<=0) return alert("Enter valid amount");

  db.ref("deposits").push({amount:amt,status:"pending"});
  alert("Deposit Sent ✅");
}

// 💸 WITHDRAW
function sendWithdraw(){
  let amt=document.getElementById("withdrawAmount").value;
  let bal=Number(localStorage.getItem("wallet"));

  if(amt<=0) return alert("Invalid");
  if(amt>bal) return alert("Low Balance");

  db.ref("withdraws").push({amount:amt,status:"pending"});
  alert("Withdraw Sent ✅");
}

// 👑 ADMIN LOAD
function loadRequests(){
  let box=document.getElementById("requestList");
  box.innerHTML="";

  db.ref("deposits").on("value",snap=>{
    box.innerHTML="";
    snap.forEach(c=>{
      let d=c.val();
      box.innerHTML+=`<div>₹${d.amount} Deposit (${d.status})</div>`;
    });
  });

  db.ref("withdraws").on("value",snap=>{
    snap.forEach(c=>{
      let d=c.val();
      box.innerHTML+=`<div>₹${d.amount} Withdraw (${d.status})</div>`;
    });
  });
}
loadRequests();

// 🎮 JOIN POPUP
function openJoinPopup(){
  document.getElementById("joinPopup").style.display="flex";
}

function submitJoin(){
  let uid=document.getElementById("uid").value;
  let name=document.getElementById("gameName").value;

  if(uid==""||name=="") return alert("Fill all");

  db.ref("players").push({uid,name});

  alert("Joined Successfully ✅");
  document.getElementById("joinPopup").style.display="none";
}

</script>

</body>
</html>
