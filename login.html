<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#1d1f3a,#2b2e5a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#2b2e5a;
  padding:25px;
  border-radius:20px;
  width:85%;
  max-width:350px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  background:cyan;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.switch{
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  color:cyan;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="title">🔥 Agent X Login</h2>

  <!-- LOGIN -->
  <form id="loginForm" onsubmit="login(event)">
    <input type="email" id="loginUser" placeholder="Enter Email">
    <input type="password" id="loginPass" placeholder="Enter Password">
    <button type="submit">Login</button>
  </form>

  <!-- REGISTER -->
  <form id="registerForm" style="display:none;" onsubmit="register(event)">
    <input type="email" id="regUser" placeholder="Enter Email">
    <input type="password" id="regPass" placeholder="Enter Password">
    <button type="submit">Register</button>
  </form>

  <div class="switch" onclick="toggleForm()">Create Account / Login</div>
</div>

<!-- 🔥 FIREBASE SDK -->
<script type="module">

// ✅ IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 TERA FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDbEHxzNCGHbCYFDESVX_qtaoiO2e0qMyM",
  authDomain: "agent-x-d7f22.firebaseapp.com",
  projectId: "agent-x-d7f22",
  storageBucket: "agent-x-d7f22.firebasestorage.app",
  messagingSenderId: "1055506789692",
  appId: "1:1055506789692:web:72a9df8c2cf9a57c92da39"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔄 SWITCH
window.toggleForm = function(){
  let loginForm = document.getElementById("loginForm");
  let registerForm = document.getElementById("registerForm");
  let title = document.getElementById("title");

  if(loginForm.style.display !== "none"){
    loginForm.style.display = "none";
    registerForm.style.display = "block";
    title.innerText = "🔥 Register";
  } else {
    loginForm.style.display = "block";
    registerForm.style.display = "none";
    title.innerText = "🔥 Agent X Login";
  }
}

// 🔐 LOGIN
window.login = function(e){
  e.preventDefault();

  let email = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  signInWithEmailAndPassword(auth, email, pass)
  .then((userCredential) => {

    localStorage.setItem("login", "yes");
    localStorage.setItem("role", "user");

    alert("Login Successful ✅");
    window.location.href = "index.html";

  })
  .catch((error) => {
    alert("Login Failed ❌ " + error.message);
  });
}

// 📝 REGISTER
window.register = function(e){
  e.preventDefault();

  let email = document.getElementById("regUser").value;
  let pass = document.getElementById("regPass").value;

  createUserWithEmailAndPassword(auth, email, pass)
  .then((userCredential) => {

    alert("Registered Successfully ✅");
    toggleForm();

  })
  .catch((error) => {
    alert("Register Failed ❌ " + error.message);
  });
}

</script>

</body>
</html>
