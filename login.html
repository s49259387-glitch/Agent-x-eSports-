<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#1d1f3a,#2b2e5a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#2b2e5a;
  padding:25px;
  border-radius:20px;
  width:85%;
  max-width:350px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  background:cyan;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.switch{
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  color:cyan;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="title">🔥 Agent X Login</h2>

  <!-- LOGIN FORM -->
  <form id="loginForm" onsubmit="login(event)">
    <input type="text" id="loginUser" placeholder="Enter Email">
    <input type="password" id="loginPass" placeholder="Enter Password">
    <button type="submit">Login</button>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" style="display:none;" onsubmit="register(event)">
    <input type="text" id="regUser" placeholder="Enter Email">
    <input type="password" id="regPass" placeholder="Enter Password">
    <button type="submit">Register</button>
  </form>

  <div class="switch" onclick="toggleForm()">Create Account / Login</div>
</div>

<script>

// 🔄 SWITCH LOGIN/REGISTER
function toggleForm(){
  let loginForm = document.getElementById("loginForm");
  let registerForm = document.getElementById("registerForm");
  let title = document.getElementById("title");

  if(loginForm.style.display !== "none"){
    loginForm.style.display = "none";
    registerForm.style.display = "block";
    title.innerText = "🔥 Register";
  } else {
    loginForm.style.display = "block";
    registerForm.style.display = "none";
    title.innerText = "🔥 Agent X Login";
  }
}

// 🔐 LOGIN
function login(e){
  e.preventDefault();

  let u = document.getElementById("loginUser").value;
  let p = document.getElementById("loginPass").value;

  if(u=="" || p==""){
    alert("Fill all fields ❌");
    return;
  }

  // 👑 ADMIN LOGIN (fixed)
  if(u === "satyam@gmail.com" && p === "1234"){
    localStorage.setItem("login", "yes");
    localStorage.setItem("role", "admin");

    alert("Admin Login Successful ✅");
    window.location.href = "index.html";
    return;
  }

  // 👤 USER LOGIN
  let data = JSON.parse(localStorage.getItem("users")) || [];

  let found = data.find(x => x.user === u && x.pass === p);

  if(found){
    localStorage.setItem("login", "yes");
    localStorage.setItem("role", "user");

    alert("Login Successful ✅");
    window.location.href = "index.html";
  } else {
    alert("Wrong Email or Password ❌");
  }
}

// 📝 REGISTER
function register(e){
  e.preventDefault();

  let u = document.getElementById("regUser").value;
  let p = document.getElementById("regPass").value;

  if(u=="" || p==""){
    alert("Fill all fields ❌");
    return;
  }

  let data = JSON.parse(localStorage.getItem("users")) || [];

  // duplicate check
  let exist = data.find(x => x.user === u);
  if(exist){
    alert("User already exists ❌");
    return;
  }

  data.push({
    user: u,
    pass: p
  });

  localStorage.setItem("users", JSON.stringify(data));

  alert("Registered Successfully ✅");

  toggleForm(); // वापस login पे
}

</script>

</body>
</html>
