<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#1d1f3a,#2b2e5a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#2b2e5a;
  padding:25px;
  border-radius:20px;
  width:85%;
  max-width:350px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  background:cyan;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 Agent X Login</h2>

  <!-- ✅ FORM USE KIYA -->
  <form onsubmit="login(event)">
    <input type="text" id="user" placeholder="Enter Email">
    <input type="password" id="pass" placeholder="Enter Password">

    <button type="submit">Login</button>
  </form>
</div>

<script>

function login(e){
  e.preventDefault(); // 🔥 page reload stop

  console.log("Login button clicked"); // debug

  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u=="" || p==""){
    alert("Fill all fields ❌");
    return;
  }

  if(u === "satyam@gmail.com" && p === "1234"){
    localStorage.setItem("login", "yes");
    localStorage.setItem("role", "admin");

    alert("Login Successful ✅");

    window.location.href = "index.html";
  } else {
    alert("Wrong Email or Password ❌");
  }
}

</script>

</body>
</html>
