<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#1d1f3a,#2b2e5a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#2b2e5a;
  padding:25px;
  border-radius:20px;
  width:85%;
  max-width:350px;
  text-align:center;
  box-shadow:0 0 20px cyan;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  background:cyan;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
.switch{
  margin-top:10px;
  color:cyan;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="title">🔥 Agent X Login</h2>

  <form id="loginForm" onsubmit="login(event)">
    <input type="email" id="loginUser" placeholder="Email" required>
    <input type="password" id="loginPass" placeholder="Password" required>
    <button>Login</button>
  </form>

  <form id="registerForm" style="display:none;" onsubmit="register(event)">
    <input type="email" id="regUser" placeholder="Email" required>
    <input type="password" id="regPass" placeholder="Password" required>
    <button>Register</button>
  </form>

  <div class="switch" onclick="toggleForm()">Create Account / Login</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "agent-x-d7f22.firebaseapp.com",
  projectId: "agent-x-d7f22",
  storageBucket: "agent-x-d7f22.appspot.com",
  messagingSenderId: "1055506789692",
  appId: "1:1055506789692:web:72a9df8c2cf9a57c92da39"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SWITCH
window.toggleForm = function(){
  loginForm.style.display =
  loginForm.style.display === "none" ? "block" : "none";

  registerForm.style.display =
  registerForm.style.display === "none" ? "block" : "none";
}

// LOGIN
window.login = function(e){
  e.preventDefault();

  let email = loginUser.value;
  let pass = loginPass.value;

  signInWithEmailAndPassword(auth, email, pass)
  .then((user) => {

    // 🔥 MAIN FIX
    localStorage.setItem("login", "yes");
    localStorage.setItem("uid", user.user.uid);

    alert("Login Success ✅");
    window.location.href="index.html";
  })
  .catch(err => alert(err.message));
}

// REGISTER
window.register = function(e){
  e.preventDefault();

  createUserWithEmailAndPassword(auth, regUser.value, regPass.value)
  .then(()=>{
    alert("Registered ✅");
    toggleForm();
  })
  .catch(err=>alert(err.message));
}

</script>

</body>
</html>
